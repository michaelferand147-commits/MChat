<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CS Chat</title>
<style>
body { font-family: sans-serif; padding: 20px; }
#messages { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; margin-bottom: 10px; }
input, button { padding: 8px; margin: 2px; }
</style>
</head>
<body>

<h2>CS Chat</h2>
<input type="text" id="username" placeholder="Nama CS">
<button onclick="startChat()">Mulai Chat</button>
<br><br>
<div id="messages"></div>
<input type="text" id="message" placeholder="Tulis pesan..." style="display:none;">
<button onclick="sendMessage()" style="display:none;">Kirim</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

// ======= Firebase Config =======
const firebaseConfig = {
  apiKey: "AIzaSyCf46sEsbuZQ4ASwrbhteRqiEVOyQdJALU",
  authDomain: "mchat-project-9e66a.firebaseapp.com",
  databaseURL: "https://mchat-project-9e66a-default-rtdb.firebaseio.com",
  projectId: "mchat-project-9e66a",
  storageBucket: "mchat-project-9e66a.firebasestorage.app",
  messagingSenderId: "783368240435",
  appId: "1:783368240435:web:e3f735b73c946b7fcd9246"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let ticketId = "";
const messagesDiv = document.getElementById('messages');

function generateTicket() { return Math.floor(1000 + Math.random()*9000).toString(); }

function startChat() {
  const username = document.getElementById('username').value.trim();
  if(!username){ alert("Masukkan nama CS!"); return; }
  ticketId = generateTicket();

  // Buat object tiket
  set(ref(db, `tickets/${ticketId}`), { csName: username, messages: {} });

  document.getElementById('message').style.display = 'inline';
  document.querySelector('button[onclick="sendMessage()"]').style.display = 'inline';
  listenMessages();
}

function sendMessage() {
  const msg = document.getElementById('message').value.trim();
  if(!msg) return;

  push(ref(db, `tickets/${ticketId}/messages`), {
    sender: "cs",
    name: document.getElementById('username').value.trim(),
    message: msg,
    timestamp: Date.now()
  });

  document.getElementById('message').value = '';
}

function listenMessages() {
  onChildAdded(ref(db, `tickets/${ticketId}/messages`), snapshot => {
    const msg = snapshot.val();
    const div = document.createElement('div');
    div.textContent = `${msg.name}: ${msg.message}`;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}
</script>
</body>
</html>
